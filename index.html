<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử Nghiệm Nhúng Âm Thanh Từ YouTube</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .audio-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 400px;
        }
        h3 {
            margin-top: 0;
            color: #333;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        /* Khung chứa YouTube để tối ưu giao diện máy nghe nhạc */
        .player-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            /* Thu hẹp chiều cao để giấu bớt phần video, chỉ lộ thanh điều khiển */
            height: 60px; 
            border: 1px solid #ddd;
        }
        .player-wrapper iframe {
            position: absolute;
            top: -50px; /* Đẩy video lên trên để giấu hình ảnh */
            left: 0;
            width: 100%;
            height: 160px; /* Tăng chiều cao ảo để thanh điều khiển của YouTube hiện đúng tầm mắt */
        }
    </style>
</head>
<body>

    <div class="audio-card">
        <h3>🎵 Trình Phát Nhạc Của Tôi</h3>
        <p>Âm thanh được lưu trữ miễn phí trên hệ thống YouTube</p>

        <!-- BẮT ĐẦU ĐOẠN MÃ NHÚNG YOUTUBE -->
        <div class="player-wrapper">
            <iframe width="560" height="315" src="https://www.youtube.com/embed/AxHCJtF0RO8?si=qd2iZ-RQjWhL63bF" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        <!-- KẾT THÚC ĐOẠN MÃ NHÚNG YOUTUBE -->

    </div>

</body>
</html>
